<div class="bot-manager-container">
    <div class="bot-manager-header">
        <h2>Bot Manager</h2>
        <div class="bot-manager-actions">
            <button class="btn btn-primary btn-create-bot">
                <i class="fa fa-plus"></i> Create New Bot
            </button>
            <button class="btn btn-default btn-import-bot">
                <i class="fa fa-upload"></i> Import Bot
            </button>
        </div>
    </div>
    
    <div class="bot-list-container">
        <div class="bot-list-loading">
            <i class="fa fa-spinner fa-spin"></i> Loading bots...
        </div>
        <div class="bot-list"></div>
    </div>
    
    <div class="bot-stats-container">
        <h4>System Statistics</h4>
        <div class="bot-stats">
            <div class="stat-item">
                <span class="stat-label">Total Bots:</span>
                <span class="stat-value" id="total-bots">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Active Sessions:</span>
                <span class="stat-value" id="active-sessions">0</span>
            </div>
        </div>
    </div>
</div>
